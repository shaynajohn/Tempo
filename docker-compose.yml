services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo
      POSTGRES_DB: tempo
    ports:
      - "5432:5432"
    volumes:
      - tempo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tempo -d tempo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tempo_pgdata:
